raw_data_path: "data/processed/baseline_dataset.csv"

# DEM raster used for terrain extraction
dem_path: "data/interim/aligned/dem_greece.tif"

# Reference raster used to convert (row, col) -> projected (x, y)
reference_raster_path: "data/interim/aligned/Burn_Prob.img"

ndvi_path: null
fire_frequency_path: null
output_dir: "data/features"

target_col: "target"
pyrome_col: null

row_col: "row_index"
col_col: "col_index"

# These are created automatically from row/col using the reference raster
lon_col: "x_coord"
lat_col: "y_coord"

split_col: null

required_columns:
  - "target"
  - "Ignition_Prob.img"
  - "CFL.img"
  - "FSP_Index.img"
  - "Struct_Exp_Index.img"
  - "Fuel_Models.img"
  - "row_index"
  - "col_index"

test_size: 0.2
random_seed: 42

bbox_greece:
  - 20.0
  - 37.0
  - 27.0
  - 42.0

log_transform_cols:
  - "CFL.img"
  - "FSP_Index.img"
  - "Struct_Exp_Index.img"
  - "Ignition_Prob.img"

fuel_model_col: "Fuel_Models.img"
fuel_max_categories: 20

multiscale_window_sizes:
  - 3
  - 7
  - 15

multiscale_feature_cols:
  - "Ignition_Prob.img"
  - "CFL.img"
  - "FSP_Index.img"

gradient_cols:
  - "Ignition_Prob.img"
  - "CFL.img"

target_distribution: "normal"

expected_min_features: 30
expected_max_features: 140

# Main cleaned feature set:
# keep compact row_norm/col_norm if present,
# but do not keep x_coord/y_coord as final model inputs
include_coordinate_features: false