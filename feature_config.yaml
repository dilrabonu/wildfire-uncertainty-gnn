raw_data_path: "data/processed/baseline_dataset.csv"
dem_path: "data/interim/aligned/dem_greece.tif"
ndvi_path: null
fire_frequency_path: null
output_dir: "data/features"

# IMPORTANT: use RAW column name
target_col: "target"
pyrome_col: null

# IMPORTANT: use RAW names
row_col: "row_index"
col_col: "col_index"

lon_col: null
lat_col: null
split_col: null

# MUST match CSV EXACTLY
required_columns:
  - "target"
  - "Ignition_Prob.img"
  - "CFL.img"
  - "FSP_Index.img"
  - "Struct_Exp_Index.img"
  - "Fuel_Models.img"

