project:
  name: wildfire-uncertainty-gnn
  random_seed: 42

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  external_dir: data/external
  reports_dir: reports

dataset:
  raw_files_dirname: FSim_Dataset_Greece_raw_files
  gdb_dirname: FSim_Dataset_Greece.gdb
  metadata_dirname: Metadata
  styles_dirname: FSim_Dataset_Greece_LYR_files_ARCGIS_QGIS_ARCGISPRO

layers:
  rasters:
    - Burn_Prob.img
    - CFL.img
    - FSP_Index.img
    - Ignition_Prob.img
    - Struct_Exp_Index.img
    - Fuel_Models.img

  vectors:
    - Fire_Ignitions.shp
    - Fire_Perimeters.shp
    - Pyromes.shp

  target: Burn_Prob.img

  continuous_features:
    - CFL.img
    - FSP_Index.img
    - Ignition_Prob.img
    - Struct_Exp_Index.img

  categorical_features:
    - Fuel_Models.img

alignment:
  reference_raster: Burn_Prob.img
  output_dir: data/interim/aligned
  continuous_resampling: bilinear
  categorical_resampling: nearest
  save_aligned_rasters: true

graph:
  connectivity: 8
  include_coordinates: true
  coordinate_mode: normalized_row_col
  normalize_continuous_features: true
  downsample_factor: 4
  max_nodes: 300000

output:
  aligned_stack_dir: data/interim/aligned
  graph_data_path: data/processed/graph_data.pt
  dataset_inventory_path: reports/logs/dataset_inventory.txt
  preprocess_log_path: reports/logs/preprocess_data.log