# Corrected to match actual wildfire-uncertainty-gnn project structure.
# Verified against: data/interim/aligned/, data/processed/baseline_dataset.csv,
#                   and configs/train_config.yaml
#
# Run: python prepare_features.py --config feature_config.yaml


# DATA PATHS  (matched to your actual file tree)

# Your node-level CSV (one row per pixel, already extracted from rasters)
raw_data_path: "data/processed/baseline_dataset.csv"

# DEM raster — NOT yet in your data/interim/aligned/ folder.
# Your current aligned rasters: Burn_Prob.img, CFL.img, FSP_Index.img,
#                               Fuel_Models.img, Ignition_Prob.img, Struct_Exp_Index.img
# DEM is the KEY MISSING feature. Download:
#   https://earthexplorer.usgs.gov/ → SRTM 1 Arc-Second Global
#   Draw box over Greece (20-27°E, 35-42°N) → download tiles → mosaic + clip → save here:
dem_path: "data/interim/aligned/dem_greece.tif"
# Set to null until downloaded — synthetic DEM will be used automatically:
# dem_path: null

# NDVI — not in your aligned folder yet.
# Download: https://scihub.copernicus.eu/ (Sentinel-2 summer composite)
ndvi_path: null
# ndvi_path: "data/interim/aligned/ndvi_summer.tif"

# Fire frequency — not present yet.
# Download: https://effis.jrc.ec.europa.eu/
fire_frequency_path: null
# fire_frequency_path: "data/interim/aligned/fire_frequency_20yr.tif"

# Pipeline outputs — kept separate from existing data/processed/
output_dir: "data/features"

# COLUMN NAMES  (run check command first — see below)
# CONFIRM exact names with:
#   python -c "import pandas as pd; print(pd.read_csv('data/processed/baseline_dataset.csv', nrows=2).columns.tolist())"

target_col: "Burn_Prob"

# Set to null — pyrome column not confirmed in your CSV
pyrome_col: null

# Integer pixel indices needed for multi-scale raster operations
row_col: "row"
col_col: "col"

# Geographic coordinates — set to null if not in CSV (DEM extraction will be skipped)
lon_col: null
lat_col: null

# null = pipeline uses its own geographic block split
# Your baseline_splits_spatial.npz stores indices — use those in graph training instead
split_col: null

# REQUIRED COLUMNS
# Two possibilities — uncomment the one that matches your CSV:

# Option A: columns WITHOUT .img suffix
required_columns:
  - "Burn_Prob"
  - "Ignition_Prob"
  - "CFL"
  - "FSP_Index"
  - "Struct_Exp_Index"
  - "Fuel_Models"

# Option B: columns WITH .img suffix (if CSV mirrors train_config raw_feature_names)
# required_columns:
#   - "Burn_Prob"
#   - "Ignition_Prob.img"
#   - "CFL.img"
#   - "FSP_Index.img"
#   - "Struct_Exp_Index.img"
#   - "Fuel_Models.img"

# SPLIT SETTINGS
test_size: 0.2
random_seed: 42

bbox_greece:
  - 20.0
  - 37.0
  - 27.0
  - 42.0

# TRANSFORM SETTINGS

# Option A: no .img suffix in CSV
log_transform_cols:
  - "CFL"
  - "FSP_Index"
  - "Struct_Exp_Index"
  - "Ignition_Prob"

fuel_model_col: "Fuel_Models"

# Option B: with .img suffix — swap above block for:
# log_transform_cols:
#   - "CFL.img"
#   - "FSP_Index.img"
#   - "Struct_Exp_Index.img"
#   - "Ignition_Prob.img"
# fuel_model_col: "Fuel_Models.img"

fuel_max_categories: 20

multiscale_window_sizes:
  - 3
  - 7
  - 15

# Option A (no suffix):
multiscale_feature_cols:
  - "Ignition_Prob"
  - "CFL"
  - "FSP_Index"

gradient_cols:
  - "Ignition_Prob"
  - "CFL"

target_distribution: "normal"

# VALIDATION THRESHOLDS
expected_min_features: 25
expected_max_features: 120

# ALIGNMENT WITH train_config.yaml
# train_config.yaml target_transform: log1p
#   → This pipeline uses QuantileTransformer (better calibration for Gaussian NLL)
#   → After running prepare_features.py, change train_config.yaml to:
#        target_transform: quantile
#
# train_config.yaml neighborhood_aggs: [mean, std, max, min, residual, contrast]
#   → Those are GRAPH-based aggregations (message passing)
#   → This pipeline adds RASTER-based multi-scale stats (3x3, 7x7, 15x15)
#   → They are complementary: raster stats = node features, graph aggs = message passing
#
# After pipeline runs → rebuild graph_data.pt with enriched node features:
#   Open 02_graph_construction.ipynb
#   Replace node feature matrix with: data/features/df_train_features.parquet
#   Feature list from: data/features/feature_names.json