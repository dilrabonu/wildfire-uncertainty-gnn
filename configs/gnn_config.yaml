model:
  name: residual_gat_regressor
  input_dim: null
  hidden_dim: 96
  output_dim: 1
  num_layers: 3
  heads: 4
  dropout: 0.25
  attn_dropout: 0.15
  use_batch_norm: true
  use_graph_norm: true
  use_residual: true
  use_jumping_knowledge: true
  jk_mode: cat
  edge_dim: 1

uncertainty:
  enabled: true
  mc_dropout_samples: 20
  predict_variance: true
  min_variance: 1.0e-6

training:
  device: cpu
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.0001
  max_epochs: 80
  early_stopping_patience: 10
  gradient_clip_norm: 5.0

loss:
  name: hybrid_gaussian_nll
  huber_delta: 0.02
  tail_weight_power: 1.5
  max_tail_weight: 6.0

target:
  transform: sqrt_scaled
  target_max: 0.25

evaluation:
  save_predictions: true
  compute_tail_metrics: true
  high_risk_threshold: 0.10