project:
  name: wildfire-uncertainty-gnn
  random_seed: 42

data:
  graph_data_path: data/processed/graph_data.pt

split:
  type: spatial
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  n_row_blocks: 8
  n_col_blocks: 8

topology:
  rebuild_from_pos: true
  connectivity: 4          # test 4 first, later 8
  use_distance_weights: true

feature_recovery:
  enabled: true

  # If current x already includes row/col, keep false.
  add_positional_features: false

  # Current likely layout:
  # [CFL, FSP_Index, Ignition_Prob, Struct_Exp_Index, Fuel_Models, row_norm, col_norm]
  fuel_model_index: 4
  fuel_encoding: one_hot   # one_hot, grouped, raw

  add_degree_feature: true

  add_neighbor_mean_features: true
  add_neighbor_std_features: false

  # use original wildfire drivers
  neighbor_summary_feature_indices: [0, 1, 2, 3]

sampling:
  enabled: true
  method: train_only_stratified
  bins: [0.0, 0.01, 0.05, 0.10, 0.25, 1.0]
  max_train_samples_per_bin: 25000

training_target:
  transform: none
  min_value: 0.0
  max_value: 0.25
  bounded_output: true

model:
  name: gcn
  in_channels: 7
  hidden_channels: 64
  num_layers: 2
  dropout: 0.1
  heads: 4
  use_batch_norm: true
  residual: true

uncertainty:
  enabled: false
  method: mse
  mc_dropout: false
  mc_samples: 0
  min_variance: 0.000001

training:
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.0001
  max_epochs: 150
  early_stopping_patience: 20
  gradient_clip_norm: 5.0
  device: cpu

evaluation:
  save_predictions: true
  save_split_diagnostics: true

outputs:
  metrics_path: reports/tables/gnn_metrics.csv
  split_diagnostics_path: reports/tables/gnn_split_diagnostics.csv
  predictions_dir: reports/tables
  figures_dir: reports/figures
  checkpoints_dir: reports/checkpoints
  logs_dir: reports/logs