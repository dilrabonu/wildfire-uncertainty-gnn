model:
  name: residual_gat_regressor
  input_dim: null
  hidden_dim: 96
  output_dim: 1
  num_layers: 3
  heads: 4
  dropout: 0.25
  attn_dropout: 0.15
  use_batch_norm: true
  use_graph_norm: true
  use_residual: true
  use_jumping_knowledge: true
  jk_mode: cat
  edge_dim: 1

uncertainty:
  enabled: true
  mc_dropout_samples: 20
  predict_variance: true
  min_variance: 1.0e-6