project:
  name: wildfire-uncertainty-gnn
  random_seed: 42

paths:
  graph_data_path: data/processed/graph_data.pt
  split_path: data/processed/baseline_splits_spatial.npz

outputs:
  checkpoints_dir: reports/checkpoints
  tables_dir: reports/tables
  figures_dir: reports/figures
  logs_dir: reports/logs

  checkpoint_name: uncertainty_gat_best.pt
  metrics_filename: gnn_metrics.csv
  tail_metrics_filename: gnn_tail_metrics.csv
  predictions_filename: gnn_test_predictions.csv
  val_predictions_filename: gnn_val_predictions.csv
  uncertainty_predictions_filename: gnn_uncertainty_predictions.csv
  calibration_metrics_filename: gnn_calibration_metrics.csv
  intervention_metrics_filename: intervention_metrics.csv
  intervention_predictions_filename: gnn_intervention_predictions.csv

model:
  name: residual_gat_regressor
  input_dim: null
  hidden_dim: 32
  output_dim: 1
  num_layers: 2
  heads: 2
  dropout: 0.2
  attn_dropout: 0.1
  use_graph_norm: true
  use_residual: true
  use_jumping_knowledge: false
  jk_mode: cat
  edge_dim: 1

uncertainty:
  enabled: true
  mc_dropout_samples: 5
  predict_variance: true
  min_variance: 1.0e-6

training:
  device: cpu
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.0001
  max_epochs: 8
  early_stopping_patience: 3
  gradient_clip_norm: 5.0

loss:
  name: hybrid_gaussian_nll
  huber_delta: 0.02
  tail_weight_power: 1.5
  max_tail_weight: 4.0
  hybrid_alpha: 0.8

target:
  transform: sqrt_scaled
  target_max: 0.25

evaluation:
  save_predictions: true
  compute_tail_metrics: true
  high_risk_threshold: 0.10
  calibration_bins: 10
  coverage_levels: [0.68, 0.95]

intervention:
  enabled: true
  feature_index_for_fuel_like_intervention: 0
  reduction_factor: 0.30
  max_nodes_to_modify: 1000