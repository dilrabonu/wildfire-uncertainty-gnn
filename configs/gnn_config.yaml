project:
  name: wildfire-uncertainty-gnn
  random_seed: 42

paths:
  graph_data_path: data/processed/graph_data_enriched.pt
  baseline_dataset_path: data/processed/baseline_dataset.csv
  random_split_path: data/processed/baseline_splits_random.npz
  spatial_split_path: data/features/splits_phase54.npz
  outputs_root: reports
  metrics_table_path: reports/tables/gnn_metrics.csv
  bin_metrics_table_path: reports/tables/gnn_bin_metrics.csv
  calibration_metrics_table_path: reports/tables/gnn_calibration_metrics.csv
  predictions_table_path: reports/tables/gnn_spatial_test_predictions.csv
  ablation_table_path: reports/tables/gnn_feature_ablation.csv
  figures_dir: reports/figures
  checkpoints_dir: reports/checkpoints
  logs_dir: reports/logs
  training_history_name: gnn_training_history.csv
  checkpoint_name: stage1_spatial_best.pt
  reliability_table_name: gnn_reliability_table.csv

data:
  split_type: spatial
  train_ratio: 0.70
  val_ratio: 0.10
  test_ratio: 0.20
  target_name: y
  use_edge_weight: false
  num_node_features_raw: 58
  target_transform: none
  target_max_raw: 0.25

feature_engineering:
  enable: false
  add_degree_feature: false
  add_neighborhood_features: false
  neighborhood_aggs: []
  add_two_hop_features: false
  two_hop_aggs: []
  add_feature_interactions: false
  interaction_pairs: []

model:
  stage1_name: graphsage
  stage2_name: residual_gat
  hidden_dim: 128
  num_layers: 3
  dropout: 0.30
  use_batch_norm: true
  use_residual: true
  sage_aggr: mean
  gat_heads: 4
  gat_dropout: 0.20
  use_jumping_knowledge: true
  jk_mode: cat
  predict_variance: false
  min_variance: 1.0e-6
  output_activation: linear

training:
  device: cpu
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.0001
  max_epochs: 80
  early_stopping_patience: 10
  gradient_clip_norm: 5.0
  loss_name:  mse
  huber_delta: 0.02
  target_reweighting: true
  target_bin_edges:
    - 0.0
    - 0.01
    - 0.05
    - 0.10
    - 0.25
  target_bin_weights:
    - 1.0
    - 2.0
    - 4.0
    - 6.0

uncertainty:
  enable_mc_dropout: false
  mc_samples: 20
  temperature_scaling: false

evaluation:
  save_predictions: true
  save_figures: true
  calibration_num_bins: 10
  high_risk_thresholds:
    - 0.01
    - 0.05
    - 0.10
  regression_bins:
    - [0.0, 0.01]
    - [0.01, 0.05]
    - [0.05, 0.10]
    - [0.10, 0.25]

ablation:
  run_feature_ablation: true
  feature_sets:
    - all_features
    - no_dem
    - no_multiscale
    - no_fuel_onehot
    - base_only