project:
  name: wildfire-uncertainty-gnn
  random_seed: 42

paths:
  graph_data_path: data/processed/graph_data.pt
  baseline_dataset_path: data/processed/baseline_dataset.csv
  random_split_path: data/processed/baseline_splits_random.npz
  spatial_split_path: data/processed/baseline_splits_spatial.npz

  outputs_root: reports
  metrics_table_path: reports/tables/gnn_metrics.csv
  bin_metrics_table_path: reports/tables/gnn_bin_metrics.csv
  calibration_metrics_table_path: reports/tables/gnn_calibration_metrics.csv
  predictions_table_path: reports/tables/gnn_spatial_test_predictions.csv
  ablation_table_path: reports/tables/gnn_feature_ablation.csv

  figures_dir: reports/figures
  checkpoints_dir: reports/checkpoints
  logs_dir: reports/logs

data:
  split_type: spatial
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

  target_name: y
  use_edge_weight: false
  num_node_features_raw: 7

  target_transform: log1p
  target_max_raw: 0.25

  raw_feature_names:
    - CFL.img
    - FSP_Index.img
    - Ignition_Prob.img
    - Struct_Exp_Index.img
    - Fuel_Models.img
    - row_norm
    - col_norm

feature_engineering:
  enable: true

  add_degree_feature: true

  add_neighborhood_features: true
  neighborhood_aggs:
    - mean
    - std
    - max
    - min
    - residual
    - contrast

  add_two_hop_features: true
  two_hop_aggs:
    - mean
    - std

  add_feature_interactions: true
  interaction_pairs:
    - [CFL.img, Ignition_Prob.img]
    - [Ignition_Prob.img, Fuel_Models.img]
    - [Struct_Exp_Index.img, Fuel_Models.img]

model:
  stage1_name: graphsage
  stage2_name: residual_gat

  hidden_dim: 128
  num_layers: 3
  dropout: 0.30
  use_batch_norm: true
  use_residual: true

  sage_aggr: mean

  gat_heads: 4
  gat_dropout: 0.20
  use_jumping_knowledge: true
  jk_mode: cat

  output_activation: bounded_sigmoid
  predict_variance: false
  min_variance: 1.0e-6

  hybrid_enabled: false
  num_risk_bins: 4
  cls_loss_weight: 0.30

training:
  device: cpu
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.0001
  max_epochs: 80
  early_stopping_patience: 10
  gradient_clip_norm: 5.0

  loss_name: weighted_huber
  huber_delta: 0.02

  target_reweighting: true
  target_bin_edges:
    - 0.0
    - 0.01
    - 0.05
    - 0.10
    - 0.25
  target_bin_weights:
    - 1.0
    - 2.0
    - 4.0
    - 6.0

  cls_class_weights:
    - 1.0
    - 2.0
    - 4.0
    - 6.0

uncertainty:
  enable_mc_dropout: false
  mc_samples: 20
  temperature_scaling: false

evaluation:
  save_predictions: true
  save_figures: true

  calibration_num_bins: 10
  high_risk_thresholds:
    - 0.01
    - 0.05
    - 0.10

  regression_bins:
    - [0.0, 0.01]
    - [0.01, 0.05]
    - [0.05, 0.10]
    - [0.10, 0.25]

ablation:
  run_feature_ablation: true
  feature_sets:
    - all_features
    - raw_only
    - raw_plus_degree
    - raw_plus_mean_std
    - full_engineered
    - no_coordinates
    - no_fuel
    - coordinates_only
    - fuel_and_coordinates