project:
  name: wildfire-uncertainty-gnn
  random_seed: 42

paths:
  graph_data_path: data/processed/graph_data.pt
  baseline_dataset_path: data/processed/baseline_dataset.csv
  random_split_path: data/processed/baseline_splits_random.npz
  spatial_split_path: data/processed/baseline_splits_spatial.npz

outputs:
  metrics_table_path: reports/tables/baseline_metrics.csv
  feature_summary_table_path: reports/tables/baseline_feature_summary.csv
  predictions_dir: reports/tables
  figures_dir: reports/figures
  logs_dir: reports/logs

data:
  target_column: target
  coordinate_columns:
    - row_index
    - col_index
  drop_coordinate_features_for_training: true
  clip_target:
    enabled: true
    min_value: 0.0
    max_value: 1.0
  drop_constant_features: true

split:
  random:
    train_size: 0.70
    val_size: 0.15
    test_size: 0.15

  spatial:
    enabled: true
    n_row_blocks: 8
    n_col_blocks: 8
    train_blocks: 0.70
    val_blocks: 0.15
    test_blocks: 0.15

models:
  random_forest:
    n_estimators: 300
    max_depth: 20
    min_samples_split: 4
    min_samples_leaf: 2
    n_jobs: -1

  xgboost:
    enabled: true
    n_estimators: 400
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0
    n_jobs: -1

  mlp:
    hidden_layer_sizes: [128, 64]
    activation: relu
    alpha: 0.0001
    batch_size: 1024
    learning_rate_init: 0.001
    max_iter: 150
    early_stopping: true

evaluation:
  metrics:
    - rmse
    - mae
    - r2
    - pearson
    - spearman